<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design Web - Tugas RWD Bootstrap</title>
    <link rel="icon" href="assets/img/profile.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <style>
      /* Small UI improvements for the login card */
      .card-login {
        overflow: hidden;
        border-radius: 0.5rem;
        min-height: 320px;
      }
      .card-login-img {
        height: 100%;
        min-height: 320px;
      }
      .card-login-img img {
        width: 80%;
      }
      @media (max-width: 767.98px) {
        .card-login {
          min-height: unset;
        }
        .card-login-img {
          display: none !important;
        }
      }
    </style>

    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="d-flex flex-column min-vh-100 bg-light text-dark">
    <header class="d-flex align-items-center">
      <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="https://picsum.photos/1920/400?random=1"
              class="d-block w-100"
              alt="..."
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://picsum.photos/1920/400?random=2"
              class="d-block w-100"
              alt="..."
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://picsum.photos/1920/400?random=3"
              class="d-block w-100"
              alt="..."
            />
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </header>

    <nav class="navbar navbar-expand-lg bg-body-tertiary py-3">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img
            src="assets/img/logo.png"
            alt="Logo"
            width="30"
            class="d-inline-block align-text-top"
          />
          Ilham Arifin
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end align-items-center"
          id="navbarNavAltMarkup"
        >
          <div
            class="navbar-nav justify-content-center align-items-center gap-3"
          >
            <a class="nav-link" aria-current="page" href="index.html">Home</a>
            <a class="nav-link" href="study.html">Study</a>
            <a class="nav-link" href="gallery.html">Gallery</a>
            <a class="nav-link" href="data-table.html">Datatable</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-4 justify-content-center">
        <div class="card shadow-sm flex-row flex-wrap card-login w-100">
          <section
            class="col-12 col-md-6 p-0 card-login-img d-flex justify-content-center align-items-center"
          >
            <img src="assets/img/login.jpg" alt="Login Image" />
          </section>

          <section class="col-12 col-md-6">
            <div class="card-body p-3 p-md-4">
              <h2 class="h4 text-center mb-4">Form Login</h2>
              <form>
                <div class="mb-3">
                  <label for="inputUsername" class="form-label">Username</label>
                  <input
                    type="text"
                    class="form-control"
                    id="inputUsername"
                    placeholder="Masukkan username"
                    aria-describedby="usernameHelp"
                    required
                    autofocus
                  />
                </div>

                <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label">
                    Email address
                  </label>
                  <input
                    type="email"
                    class="form-control"
                    id="exampleInputEmail1"
                    placeholder="you@example.com"
                    aria-describedby="emailHelp"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="exampleInputPassword1" class="form-label">
                    Password
                  </label>
                  <input
                    type="password"
                    class="form-control"
                    id="exampleInputPassword1"
                    placeholder="Minimal 8 karakter"
                    required
                  />
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Login
                </button>
              </form>

              <div
                class="d-flex justify-content-between align-items-center mt-3"
              >
                <div class="small text-muted">
                  Belum punya akun? <a href="#">Daftar</a>
                </div>
                <a href="#" class="small">Lupa password?</a>
              </div>

              <hr class="my-4" />

              <div class="text-center">
                <div class="small text-muted mb-2">Atau masuk dengan</div>
                <div
                  class="d-flex justify-content-center align-items-center gap-3"
                >
                  <a href="#" class="text-decoration-none text-dark fs-4"
                    ><i class="bi bi-facebook"></i
                  ></a>
                  <a href="#" class="text-decoration-none text-dark fs-4"
                    ><i class="bi bi-google"></i
                  ></a>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="bg-white border-top py-3 mt-auto">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-6 mb-3 mb-md-0">
            <div class="d-flex align-items-center gap-2">
              <div>
                <div class="fw-bold">Lorem, ipsum.</div>
                <div class="small text-muted">
                  <p>
                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                    Quaerat, maiores.
                  </p>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6 text-md-end">
            <div class="mb-2 small text-muted">
              Created by Ilham Arifin • © 2026 NF Academy
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
